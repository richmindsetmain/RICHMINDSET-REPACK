<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIDER-MAN 2 | RICHMINDSET REPACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* THEME: SPIDEY RED & SYMBIOTE BLACK */
            --spidey-red: #e61e25; 
            --venom-blue: #002d5e; 
            --glass: rgba(10, 5, 10, 0.9); 
            --border-glow: rgba(230, 30, 37, 0.4); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; text-decoration: none; }
        
        body { 
            background: #080202; 
            color: white; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        #three-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .nav-header { 
            position: fixed; top: 0; width: 100%; 
            padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .back-link { 
            border: 1px solid var(--spidey-red); color: var(--spidey-red); 
            padding: 10px 22px; font-family: 'Orbitron'; 
            font-size: 0.75rem; transition: 0.3s; background: rgba(0,0,0,0.6); 
            border-radius: 2px; text-shadow: 0 0 8px var(--spidey-red);
            letter-spacing: 2px;
        }

        .back-link:hover { background: var(--spidey-red); color: #fff; box-shadow: 0 0 25px var(--spidey-red); }

        .container { 
            max-width: 1600px;
            margin: 100px auto 40px; 
            padding: 0 30px; 
            z-index: 10; 
            position: relative;
        }

        .video-box { 
            width: 100%;
            aspect-ratio: 21/9; 
            max-height: 450px; 
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            overflow: hidden; 
            margin-bottom: 30px; 
            background: #000;
        }

        .main-content-layout { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }

        @media (min-width: 1100px) {
            .main-content-layout { 
                grid-template-columns: 350px 1fr; 
                gap: 30px; 
            }
        }

        .info-card { 
            background: var(--glass); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            backdrop-filter: blur(25px);
            border-top: 4px solid var(--spidey-red);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title { 
            font-family: 'Orbitron'; 
            font-size: 2.2rem; 
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--venom-blue);
            margin-bottom: 15px;
            color: #fff;
        }

        .stats { font-size: 0.85rem; color: var(--spidey-red); margin-bottom: 20px; }
        .stats p { padding: 8px 0; border-bottom: 1px solid rgba(230, 30, 37, 0.1); }

        .dl-btn { 
            background: linear-gradient(90deg, #b11313, #e61e25);
            color: white; padding: 18px; text-align: center; 
            font-family: 'Orbitron'; font-weight: 900; 
            transition: 0.3s; border: none; cursor: pointer; letter-spacing: 2px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        .dl-btn:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 20px var(--spidey-red); }

        .screenshot-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .ss-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            border: 2px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            background: #110505;
            transition: 0.4s ease;
        }

        .ss-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s transform ease;
        }

        .ss-box:hover {
            border-color: var(--spidey-red);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(230, 30, 37, 0.3);
        }

        .ss-box:hover img { transform: scale(1.05); }

        @media (max-width: 800px) {
            .screenshot-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    
    <header class="nav-header">
        <a href="games.html" class="back-link">← CITY_SENSORS</a>
        <div style="font-family: 'Orbitron'; color: var(--spidey-red); font-size: 0.7rem; letter-spacing: 4px;">PROJECT_SPIDER // BE_GREATER_TOGETHER</div>
    </header>

    <main class="container">
        <div class="video-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/qIQ3xNqk_u4" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="main-content-layout">
            <div class="info-card">
                <div>
                    <h1 class="title">Spider-Man 2</h1>
                    <p style="opacity: 0.7; margin-bottom: 20px;">Swing, jump, and utilize the new Web Wings to travel across Marvel’s New York, switching between Peter Parker and Miles Morales.</p>
                    <div class="stats">
                        <p>● BUILD: PC_OPTIMIZED_V2</p>
                        <p>● ASSET_SIZE: 85 GB</p>
                        <p>● SYSTEM: STABLE</p>
                    </div>
                </div>
                <button class="dl-btn">INITIALIZE WEBS</button>
            </div>

            <div class="screenshot-container">
                <div class="ss-box"><img src="https://images.alphacoders.com/131/1316530.jpeg" alt="Spidey 1"></div>
                <div class="ss-box"><img src="https://images7.alphacoders.com/133/1337446.png" alt="Spidey 2"></div>
                <div class="ss-box"><img src="https://images3.alphacoders.com/133/1337443.png" alt="Spidey 3"></div>
                <div class="ss-box"><img src="https://images5.alphacoders.com/133/1337444.png" alt="Spidey 4"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#three-canvas'), alpha: true });
        
        function resize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        camera.position.z = 130;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 4000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(1200), THREE.MathUtils.randFloatSpread(1200), THREE.MathUtils.randFloatSpread(1200));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const points = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0xe61e25, size: 0.8 }));
        scene.add(points);

        function anim() {
            requestAnimationFrame(anim);
            points.rotation.y += 0.0008;
            renderer.render(scene, camera);
        }
        anim();
    </script>
</body>
</html>
