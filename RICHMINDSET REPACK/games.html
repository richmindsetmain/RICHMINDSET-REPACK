<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICHMINDSET | GAMES DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-green: #24ff14;
            --glass-border: rgba(255, 255, 255, 0.12);
            --header-bg: rgba(0, 0, 0, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none; scroll-behavior: smooth; }

        body {
            background-color: #000;
            color: white;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        #three-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        header {
            position: sticky;
            top: 0;
            width: 100%;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 5%;
            z-index: 1000;
        }

        .brand-name { font-family: 'Orbitron'; font-size: 1.2rem; color: #fff; text-transform: uppercase; }
        .brand-name span { color: var(--neon-green); font-size: 0.7rem; display: block; letter-spacing: 2px; }

        .top-nav-bar { display: flex; gap: 15px; }
        .nav-btn {
            color: #ccc;
            font-family: 'Orbitron';
            font-size: 0.75rem;
            padding: 8px 16px;
            transition: 0.3s;
        }
        .nav-btn:hover { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); }

        .main-content {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 5%;
        }

        .category-block { margin-bottom: 80px; }
        .category-title {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            margin-bottom: 40px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .category-title::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .viewing-portal {
            position: relative;
            height: 220px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .viewing-portal:hover {
            border-color: var(--neon-blue);
            background: rgba(0, 229, 255, 0.05);
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
        }

        .label { font-family: 'Orbitron'; font-size: 1.1rem; color: #fff; text-align: center; letter-spacing: 1px; }
        .status { font-size: 0.6rem; color: var(--neon-blue); margin-top: 12px; letter-spacing: 3px; font-weight: 700; }

        .return-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            background: #000;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px 25px;
            font-family: 'Orbitron';
            font-size: 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1000;
            transition: 0.3s;
        }
        .return-btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        @media (max-width: 768px) {
            header { flex-direction: column; gap: 20px; }
            .category-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>

    <header>
        <div class="brand-container">
            <a href="index.html" class="brand-name">RICHMINDSET<span>REPACKS</span></a>
        </div>
        <nav class="top-nav-bar">
            <a href="index.html" class="nav-btn">HOME</a>
            <a href="games.html" class="nav-btn" style="color: var(--neon-blue)">GAMES</a>
            <a href="mods.html" class="nav-btn">MODS</a>
            <a href="premium.html" class="nav-btn">👑 PREMIUM</a>
        </nav>
    </header>

    <main class="main-content" id="portal-container"></main>

    <button class="return-btn" onclick="window.scrollTo(0,0)">↑ TOP</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const library = [
            { 
                cat: "Rockstar Collection", 
                games: ["GTA V", "Red Dead II", "GTA IV", "GTA San Andreas", "GTA Vice City", "Bully SE", "L.A. Noire", "Max Payne 3"] 
            },
            { 
                cat: "Call of Duty", 
                games: ["Black Ops 6", "MW III", "MW II", "MW 2019", "Cold War", "Black Ops 3", "Vanguard", "WWII", "Ghosts", "Adv Warfare"] 
            },
            { 
                cat: "Racing Hub", 
                games: ["Forza Horizon 5", "Forza Motorsport", "NFS Unbound", "F1 2024", "Crew Motorfest", "Gran Turismo 7", "Assetto Corsa", "Dirt 5"] 
            },
            { 
                cat: "Action & RPG", 
                games: ["Elden Ring", "Cyberpunk 2077", "Ghost of Tsushima", "God of War Rag", "Spider-Man 2", "TLOU Part II", "Horizon West", "Starfield", "Alan Wake 2", "Ratchet Clank"] 
            }
        ];

        const container = document.getElementById('portal-container');

        library.forEach(section => {
            const block = document.createElement('div');
            block.className = 'category-block';
            
            const portalHtml = `
                <h2 class="category-title">${section.cat}</h2>
                <div class="portal-grid">
                    ${section.games.map(name => {
                        const url = name.toLowerCase().replace(/ /g, '-').replace(/:/g, '').replace(/\./g, '') + ".html";
                        return `
                            <a href="${url}">
                                <div class="viewing-portal">
                                    <span class="label">${name}</span>
                                    <span class="status">SYNC_STABLE</span>
                                </div>
                            </a>
                        `;
                    }).join('')}
                </div>
            `;
            block.innerHTML = portalHtml;
            container.appendChild(block);
        });

        // --- THREE.JS BACKGROUND WITH CURSOR PARALLAX ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#three-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 100;

        const stars = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<6000; i++) {
            pos.push(THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500));
        }
        stars.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const starPoints = new THREE.Points(stars, new THREE.PointsMaterial({ color: 0xffffff, size: 0.6 }));
        scene.add(starPoints);

        let mouseX = 0, mouseY = 0;
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2) / 120;
            mouseY = (e.clientY - window.innerHeight / 2) / 120;
        });

        function animate() {
            requestAnimationFrame(animate);
            starPoints.rotation.y += 0.0003;
            starPoints.position.x += (mouseX - starPoints.position.x) * 0.05;
            starPoints.position.y += (-mouseY - starPoints.position.y) * 0.05;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
