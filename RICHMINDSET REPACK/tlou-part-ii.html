<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LAST OF US PART II | RICHMINDSET REPACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* THEME: OVERGROWN GREEN & SURVIVALIST MUD */
            --tlou-green: #4a5d4e; 
            --tlou-accent: #a3b18a; 
            --glass: rgba(15, 20, 15, 0.92); 
            --border-glow: rgba(163, 177, 138, 0.3); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; text-decoration: none; }
        
        body { 
            background: #0a0c0a; 
            color: #e0e0e0; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        #three-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .nav-header { 
            position: fixed; top: 0; width: 100%; 
            padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
        }

        .back-link { 
            border: 1px solid var(--tlou-accent); color: var(--tlou-accent); 
            padding: 10px 22px; font-family: 'Orbitron'; 
            font-size: 0.75rem; transition: 0.3s; background: rgba(0,0,0,0.6); 
            border-radius: 2px; text-shadow: 0 0 8px var(--tlou-accent);
            letter-spacing: 2px;
        }

        .back-link:hover { background: var(--tlou-accent); color: #000; box-shadow: 0 0 25px var(--tlou-accent); }

        .container { 
            max-width: 1600px;
            margin: 100px auto 40px; 
            padding: 0 30px; 
            z-index: 10; 
            position: relative;
        }

        .video-box { 
            width: 100%;
            aspect-ratio: 21/9; 
            max-height: 450px; 
            border: 1px solid var(--border-glow);
            border-radius: 2px;
            overflow: hidden; 
            margin-bottom: 30px; 
            background: #000;
            filter: sepia(0.2);
        }

        .main-content-layout { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }

        @media (min-width: 1100px) {
            .main-content-layout { 
                grid-template-columns: 350px 1fr; 
                gap: 30px; 
            }
        }

        .info-card { 
            background: var(--glass); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            backdrop-filter: blur(25px);
            border-top: 4px solid var(--tlou-green);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title { 
            font-family: 'Orbitron'; 
            font-size: 1.8rem; 
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            color: #f5f5f5;
            letter-spacing: -1px;
        }

        .stats { font-size: 0.85rem; color: var(--tlou-accent); margin-bottom: 20px; }
        .stats p { padding: 8px 0; border-bottom: 1px solid rgba(163, 177, 138, 0.1); }

        .dl-btn { 
            background: #2d3a30;
            color: var(--tlou-accent); padding: 18px; text-align: center; 
            font-family: 'Orbitron'; font-weight: 900; 
            transition: 0.3s; border: 1px solid var(--tlou-green); cursor: pointer; letter-spacing: 2px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 95% 100%, 0% 100%);
        }

        .dl-btn:hover { background: var(--tlou-green); color: #fff; transform: translateY(-2px); }

        .screenshot-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .ss-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            background: #1a1a1a;
            transition: 0.4s ease;
        }

        .ss-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(0.2) contrast(1.1);
            transition: 0.5s transform ease, 0.5s filter ease;
        }

        .ss-box:hover {
            border-color: var(--tlou-accent);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .ss-box:hover img { transform: scale(1.05); filter: grayscale(0) contrast(1.1); }

        @media (max-width: 800px) {
            .screenshot-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    
    <header class="nav-header">
        <a href="games.html" class="back-link">← ENDURE_SURVIVE</a>
        <div style="font-family: 'Orbitron'; color: var(--tlou-accent); font-size: 0.7rem; letter-spacing: 4px;">PROJECT_ELIE // NO_RETURN</div>
    </header>

    <main class="container">
        <div class="video-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/vhII1qlcZ4E" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="main-content-layout">
            <div class="info-card">
                <div>
                    <h1 class="title">TLOU Part II</h1>
                    <p style="opacity: 0.7; margin-bottom: 20px;">Experience the devastating emotional journey of Ellie and Abby. A masterpiece of tension, stealth, and survival combat.</p>
                    <div class="stats">
                        <p>● BUILD: V1.0.5.0_STABLE</p>
                        <p>● ASSET_SIZE: 95 GB</p>
                        <p>● SYSTEM: VULKAN_READY</p>
                    </div>
                </div>
                <button class="dl-btn">SCAVENGE DATA</button>
            </div>

            <div class="screenshot-container">
                <div class="ss-box"><img src="https://images.alphacoders.com/108/1083515.jpg" alt="TLOU 1"></div>
                <div class="ss-box"><img src="https://images3.alphacoders.com/102/1023259.jpg" alt="TLOU 2"></div>
                <div class="ss-box"><img src="https://images6.alphacoders.com/108/1083514.jpg" alt="TLOU 3"></div>
                <div class="ss-box"><img src="https://images6.alphacoders.com/102/1023261.jpg" alt="TLOU 4"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#three-canvas'), alpha: true });
        
        function resize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        camera.position.z = 200;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 3500; i++) {
            // Muted, slower particle movement to feel like spores
            vertices.push(THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const points = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x4a5d4e, size: 1.2, transparent: true, opacity: 0.6 }));
        scene.add(points);

        function anim() {
            requestAnimationFrame(anim);
            points.rotation.y += 0.0002;
            points.position.y += Math.sin(Date.now() * 0.001) * 0.05;
            renderer.render(scene, camera);
        }
        anim();
    </script>
</body>
</html>
