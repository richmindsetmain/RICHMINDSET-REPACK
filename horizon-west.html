<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HORIZON FORBIDDEN WEST | RICHMINDSET REPACK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* THEME: FORBIDDEN WEST TEAL & MACHINE GOLD */
            --hzw-teal: #00ffd5; 
            --hzw-gold: #ffb700; 
            --glass: rgba(5, 15, 15, 0.85); 
            --border-glow: rgba(0, 255, 213, 0.3); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; text-decoration: none; }
        
        body { 
            background: #020a0a; 
            color: #f0fdfa; 
            font-family: 'Rajdhani', sans-serif; 
            overflow-x: hidden; 
            min-height: 100vh;
        }

        #three-canvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }

        .nav-header { 
            position: fixed; top: 0; width: 100%; 
            padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center; z-index: 100; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .back-link { 
            border: 1px solid var(--hzw-teal); color: var(--hzw-teal); 
            padding: 10px 22px; font-family: 'Orbitron'; 
            font-size: 0.75rem; transition: 0.3s; background: rgba(0,0,0,0.6); 
            border-radius: 2px; text-shadow: 0 0 8px var(--hzw-teal);
            letter-spacing: 2px;
        }

        .back-link:hover { background: var(--hzw-teal); color: #000; box-shadow: 0 0 25px var(--hzw-teal); }

        .container { 
            max-width: 1600px;
            margin: 100px auto 40px; 
            padding: 0 30px; 
            z-index: 10; 
            position: relative;
        }

        .video-box { 
            width: 100%;
            aspect-ratio: 21/9; 
            max-height: 450px; 
            border: 1px solid var(--border-glow);
            border-radius: 4px;
            overflow: hidden; 
            margin-bottom: 30px; 
            background: #000;
        }

        .main-content-layout { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 30px; 
        }

        @media (min-width: 1100px) {
            .main-content-layout { 
                grid-template-columns: 350px 1fr; 
                gap: 30px; 
            }
        }

        .info-card { 
            background: var(--glass); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            padding: 30px; 
            backdrop-filter: blur(25px);
            border-top: 4px solid var(--hzw-gold);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title { 
            font-family: 'Orbitron'; 
            font-size: 1.8rem; 
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0, 255, 213, 0.4);
            margin-bottom: 15px;
            color: #fff;
        }

        .stats { font-size: 0.85rem; color: var(--hzw-gold); margin-bottom: 20px; }
        .stats p { padding: 8px 0; border-bottom: 1px solid rgba(255, 183, 0, 0.1); }

        .dl-btn { 
            background: linear-gradient(90deg, #008f7a, #00ffd5);
            color: #000; padding: 18px; text-align: center; 
            font-family: 'Orbitron'; font-weight: 900; 
            transition: 0.3s; border: none; cursor: pointer; letter-spacing: 2px;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .dl-btn:hover { transform: scale(1.05); filter: brightness(1.2); box-shadow: 0 0 20px var(--hzw-teal); }

        .screenshot-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .ss-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9; 
            border: 2px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
            background: #011a1a;
            transition: 0.4s ease;
        }

        .ss-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s transform ease;
        }

        .ss-box:hover {
            border-color: var(--hzw-teal);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 255, 213, 0.2);
        }

        .ss-box:hover img { transform: scale(1.05); }

        @media (max-width: 800px) {
            .screenshot-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <canvas id="three-canvas"></canvas>
    
    <header class="nav-header">
        <a href="games.html" class="back-link">← FOCUS_SCAN</a>
        <div style="font-family: 'Orbitron'; color: var(--hzw-gold); font-size: 0.7rem; letter-spacing: 4px;">PROJECT_ALOY // FORBIDDEN_WEST</div>
    </header>

    <main class="container">
        <div class="video-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/Lq594XmpPBg" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="main-content-layout">
            <div class="info-card">
                <div>
                    <h1 class="title">Horizon West</h1>
                    <p style="opacity: 0.7; margin-bottom: 20px;">Join Aloy as she braves the Forbidden West – a majestic but dangerous frontier that conceals mysterious new threats.</p>
                    <div class="stats">
                        <p>● BUILD: V1.5.0_COMPLETE</p>
                        <p>● ASSET_SIZE: 121 GB</p>
                        <p>● SYSTEM: DLSS_3_READY</p>
                    </div>
                </div>
                <button class="dl-btn">OVERRIDE CORE</button>
            </div>

            <div class="screenshot-container">
                <div class="ss-box"><img src="https://images7.alphacoders.com/114/1149481.jpg" alt="Horizon 1"></div>
                <div class="ss-box"><img src="https://images8.alphacoders.com/114/1149482.jpg" alt="Horizon 2"></div>
                <div class="ss-box"><img src="https://images3.alphacoders.com/121/1218962.jpg" alt="Horizon 3"></div>
                <div class="ss-box"><img src="https://images2.alphacoders.com/114/1149484.jpg" alt="Horizon 4"></div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.querySelector('#three-canvas'), alpha: true });
        
        function resize() {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
        window.addEventListener('resize', resize);
        resize();

        camera.position.z = 140;
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500), THREE.MathUtils.randFloatSpread(1500));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const points = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x00ffd5, size: 0.6 }));
        scene.add(points);

        function anim() {
            requestAnimationFrame(anim);
            points.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        anim();
    </script>
</body>
</html>
